<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amago | Monitor de Agentes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --surface: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 35%);
        }

        header {
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--success));
            border-radius: 8px;
            box-shadow: 0 0 20px var(--accent-glow);
            position: relative;
        }

        .pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            background: inherit;
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
            z-index: -1;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            80%, 100% { transform: scale(2.5); opacity: 0; }
        }

        .title h1 {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .project-info {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .progress-container {
            width: 150px;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            width: 0%;
            transition: width 0.5s ease;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .info-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 1.5rem;
            padding: 1.5rem;
            overflow: hidden;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow: hidden;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        /* Agents Hub */
        .btn-select-all {
            width: 100%;
            padding: 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-select-all:hover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .btn-select-all.active {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.2);
        }

        .agents-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .agent-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            --glow-color: transparent;
        }

        .agent-card.active-glow {
            border-color: var(--glow-color);
            box-shadow: 0 0 15px var(--glow-color), inset 0 0 10px rgba(255,255,255,0.02);
        }

        .agent-card:hover, .agent-card.selected {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
            transform: translateX(4px);
        }

        .agent-header {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .agent-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1rem;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .agent-meta {
            flex: 1;
        }

        .agent-name {
            font-weight: 800;
            font-size: 0.8rem;
            color: var(--text-dim);
            display: block;
        }

        .agent-status {
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-ocioso { color: var(--text-dim); }
        .status-pensando { color: var(--warning); animation: pulse-text 1.5s infinite; }
        .status-executando { color: var(--success); }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .agent-task {
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.5rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Chat Hub */
        .chat-hub {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 85%;
            align-self: flex-start;
        }

        .message.system {
            align-self: center;
            opacity: 0.5;
            font-size: 0.75rem;
        }

        .msg-bubble {
            background: rgba(255,255,255,0.05);
            padding: 0.75rem 1rem;
            border-radius: 12px 12px 12px 2px;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            line-height: 1.5;
        }

        .msg-meta {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-bottom: 0.25rem;
            display: flex;
            gap: 0.5rem;
            font-weight: 600;
        }

        .msg-meta .agent { color: var(--accent); text-transform: uppercase; }

        /* Task Matrix */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .task-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            transition: border-color 0.3s;
        }

        .task-card:hover {
            border-color: var(--accent);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .task-title {
            font-size: 0.8rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .badge-state {
            font-size: 0.55rem;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-weight: 800;
        }

        .state-pendente { background: var(--warning); color: #000; }
        .state-fazendo { background: var(--accent); color: #fff; }
        .state-revisao { background: var(--danger); color: #fff; animation: pulse-text 1s infinite; }
        .state-pronto { background: var(--success); color: #000; }

        .section-title {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="logo-box"><div class="pulse"></div></div>
            <div class="title">
                <h1>Amago Monitor de Agentes</h1>
            </div>
        </div>
        <div class="project-info">
            <div class="info-item">
                <span class="info-label">Missão</span>
                <span class="info-value" id="project-name">---</span>
            </div>
            <div class="info-item">
                <span class="info-label">Stack</span>
                <span class="info-value" id="project-stack">---</span>
            </div>
            <div class="info-item">
                <span class="info-label">Progresso</span>
                <div class="progress-container">
                    <div class="progress-bar" id="project-progress"></div>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">Heartbeat</span>
                <span class="info-value" id="last-update" style="color: var(--success)">ACTIVE</span>
            </div>
        </div>
    </header>

    <main>
        <!-- Coluna 1: Squad de Agentes -->
        <section class="column">
            <div class="section-title">Squad de Agentes</div>
            <button class="btn-select-all" id="btn-global" onclick="selectGlobal()">
                <span>🌐</span> Selecionar Todos (Log Global)
            </button>
            <div class="scrollable-content">
                <div class="agents-list" id="agents-container">
                    <!-- Agentes via JS -->
                </div>
            </div>
        </section>

        <!-- Coluna 2: Comunicação -->
        <section class="column">
            <div class="section-title">Central de Comunicação</div>
            <div class="chat-hub">
                <div class="chat-header">
                    <span id="chat-title">LOG GLOBAL</span>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <!-- Mensagens via JS -->
                </div>
            </div>
        </section>

        <!-- Coluna 3: Tarefas -->
        <section class="column">
            <div class="section-title">Matriz de Tarefas</div>
            <div class="scrollable-content">
                <div class="task-list" id="task-list">
                    <!-- Tarefas via JS -->
                </div>
            </div>
        </section>
    </main>

    <script src="gestor_data.js"></script>
    <script>
        let selectedAgent = 'GLOBAL';
        const agentAvatars = {
            PM: '🧠',
            FRONTEND: '🎨',
            BACKEND: '⚙️',
            SECURITY: '🛡️',
            QA: '🔍',
            GESTOR: '🤖',
            SISTEMA: '⚡'
        };

        function selectGlobal() {
            selectedAgent = 'GLOBAL';
            updateDashboard();
        }

        function updateDashboard() {
            const data = window.AMAGO_DATA;
            if (!data) return;

            document.getElementById('project-name').textContent = data.projeto || 'N/A';
            document.getElementById('project-stack').textContent = data.stack || 'Standard';
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            document.getElementById('project-progress').style.width = (data.progresso || 0) + '%';

            // Botão Global Active State
            const btnGlobal = document.getElementById('btn-global');
            if (selectedAgent === 'GLOBAL') btnGlobal.classList.add('active');
            else btnGlobal.classList.remove('active');

            // Agentes
            const agentsContainer = document.getElementById('agents-container');
            agentsContainer.innerHTML = '';
            
            for (const [name, info] of Object.entries(data.agentes)) {
                const isOcioso = info.estado === 'OCIOSO';
                const isSelected = selectedAgent === name;
                const card = document.createElement('div');
                
                // Glow Color Logic
                let glowColor = 'transparent';
                if (!isOcioso) {
                    if (info.estado === 'PENSANDO') glowColor = 'rgba(245, 158, 11, 0.4)';
                    else if (info.estado === 'EXECUTANDO') glowColor = 'rgba(16, 185, 129, 0.4)';
                }

                card.className = `agent-card ${isSelected ? 'selected' : ''} ${!isOcioso ? 'active-glow' : ''}`;
                card.style.setProperty('--glow-color', glowColor);
                
                card.onclick = () => {
                    selectedAgent = name;
                    updateDashboard();
                };
                
                const avatarBorderColor = !isOcioso ? 'var(--accent)' : 'var(--border)';
                
                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-avatar" style="border-color: ${avatarBorderColor}">${agentAvatars[name] || '👤'}</div>
                        <div class="agent-meta">
                            <span class="agent-name">${name}</span>
                            <span class="agent-status status-${info.estado.toLowerCase()}">${info.estado}</span>
                        </div>
                    </div>
                    <div class="agent-task">${info.tarefa || 'Standby...'}</div>
                `;
                agentsContainer.appendChild(card);
            }

            // Chat Hub
            const chatTitle = document.getElementById('chat-title');
            chatTitle.textContent = selectedAgent === 'GLOBAL' ? 'LOG GLOBAL' : `CHAT: ${selectedAgent}`;
            
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = '';
            
            const filteredLogs = data.logs.filter(log => 
                selectedAgent === 'GLOBAL' || log.agente === selectedAgent || log.agente === 'SISTEMA' || log.agente === 'GESTOR'
            ).slice(0, 30);

            filteredLogs.reverse().forEach(log => {
                const isSystem = log.agente === 'SISTEMA' || log.agente === 'GESTOR';
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isSystem ? 'system' : ''}`;
                
                const avatar = agentAvatars[log.agente] || '👤';
                
                msgDiv.innerHTML = `
                    <div class="msg-meta">
                        <span class="time">${log.timestamp}</span>
                        <span class="agent">${avatar} ${log.agente}</span>
                    </div>
                    <div class="msg-bubble">${log.mensagem}</div>
                `;
                chatMessages.appendChild(msgDiv);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Tarefas
            const taskList = document.getElementById('task-list');
            taskList.innerHTML = '';
            data.tarefas.reverse().forEach(task => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <div class="task-header">
                        <span style="color: var(--accent); font-weight: 700;">${task.id}</span>
                        <span class="badge-state state-${task.estado.toLowerCase()}">${task.estado}</span>
                    </div>
                    <div class="task-title">${task.descricao}</div>
                    <div style="font-size: 0.6rem; color: var(--text-dim); margin-top: 0.5rem;">Responsável: ${task.responsavel}</div>
                `;
                taskList.appendChild(card);
            });
        }

        updateDashboard();
        setInterval(() => {
            const script = document.createElement('script');
            script.src = 'gestor_data.js?t=' + Date.now();
            script.onload = () => {
                updateDashboard();
                script.remove();
            };
            document.body.appendChild(script);
        }, 3000);
    </script>
</body>
</html>
